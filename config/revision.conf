# Jidō Renga — derivative build-revision inputs.
#
# We pin the captive Haiku (we do not roll it), and Haiku's GitHub mirror does
# not carry the hrev tags, so we RECORD OUR OWN revision instead of scraping it.
#
# tools/haiku-revision composes:
#
#     <upstream>+jido-renga-<JIDO_RENGA_VERSION>
#
# and tools/jr-jam exports it as HAIKU_REVISION before Jam starts. The early
# environment import is required because Haiku determines the revision before
# it includes the build's UserBuildConfig.

# Upstream label of the pinned captive. When you pin to a known release/beta,
# record its hrev here by hand (the mirror can't tell us), e.g.
#     UPSTREAM_REVISION=hrev57937
# Leave empty to auto-derive from the captive: `git describe` against hrev tags
# if any exist, else the captive HEAD's short commit as g<sha>.
#
# IMPORTANT for anyboot/image builds: this label is folded verbatim into the
# haiku *package version* (build/jam/PackageRules turns
#   <upstream>+jido-renga-<ver>  into  r1~beta5_<upstream>_jido_renga_<ver>-1).
# HaikuPorts packages in the image require e.g. `haiku >= r1~beta5_hrev57937_111`.
# Package versions compare with NaturalCompare (numeric-aware) over the
# pre-release string, so a `g<sha>` fallback sorts BELOW any `hrev...` baseline
# ('g' < 'h') and dependency resolution fails with "nothing provides haiku>=…".
# For image builds you MUST pin a real `hrev<N>` here with N >= the HaikuPorts
# baseline (currently hrev57937). Add-on-only builds don't resolve packages and
# tolerate an empty value. The captive HEAD (gb5fd959d60) is master past beta5;
# hrev57937 is the safe, verifiable baseline every downloaded package accepts.
# Substitute the captive's precise master hrev if you want `uname` accuracy.
UPSTREAM_REVISION=hrev57937

# This overlay's version.
JIDO_RENGA_VERSION=0.1.1
