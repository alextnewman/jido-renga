# Jidō Renga — derivative build-revision inputs.
#
# We pin the captive Haiku (we do not roll it), and Haiku's GitHub mirror does
# not carry the hrev tags, so we RECORD OUR OWN revision instead of scraping it.
#
# tools/haiku-revision composes:
#
#     <upstream>+jido-renga-<JIDO_RENGA_VERSION>
#
# and tools/weave installs it as HAIKU_REVISION in the build's UserBuildConfig.
# Haiku documents this exact override in build/jam/UserBuildConfig.ReadMe
# ("useful when your git repository doesn't have hrev tags").

# Upstream label of the pinned captive. When you pin to a known release/beta,
# record its hrev here by hand (the mirror can't tell us), e.g.
#     UPSTREAM_REVISION=hrev57937
# Leave empty to auto-derive from the captive: `git describe` against hrev tags
# if any exist, else the captive HEAD's short commit as g<sha>.
UPSTREAM_REVISION=

# This overlay's version.
JIDO_RENGA_VERSION=0.1.0
